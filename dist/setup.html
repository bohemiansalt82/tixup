<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tixup - System Configuration</title>
    <link rel="stylesheet" href="assets/css/tokens.css">
    <link rel="stylesheet" href="assets/css/setup.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
</head>

<body>
    <div class="setup-container">
        <div class="setup-card">
            <header class="setup-header">
                <div class="logo-box"></div>
                <h1>System Configuration</h1>
                <p>온프라미스 환경 설정을 완료해 주세요.</p>
            </header>

            <form id="setup-form" class="setup-form">
                <!-- Server Config -->
                <section class="form-section">
                    <h3><span class="material-icons-outlined">dns</span> Server Settings</h3>
                    <div class="form-grid">
                        <div class="field">
                            <label>Host</label>
                            <input type="text" id="server-host" value="localhost" placeholder="e.g. localhost">
                        </div>
                        <div class="field">
                            <label>Port</label>
                            <input type="number" id="server-port" value="8001">
                        </div>
                    </div>
                    <div class="field">
                        <label>Static Files Path (WWW)</label>
                        <input type="text" id="server-www" value="www">
                    </div>
                </section>

                <!-- Redis Config -->
                <section class="form-section">
                    <h3><span class="material-icons-outlined">storage</span> Redis Cache</h3>
                    <div class="form-grid">
                        <div class="field">
                            <label>Redis Host</label>
                            <input type="text" id="redis-host" value="localhost">
                        </div>
                        <div class="field">
                            <label>Redis Port</label>
                            <input type="number" id="redis-port" value="6379">
                        </div>
                    </div>
                    <div class="form-grid">
                        <div class="field">
                            <label>Username (Optional)</label>
                            <input type="text" id="redis-user">
                        </div>
                        <div class="field">
                            <label>Password (Optional)</label>
                            <input type="password" id="redis-pass">
                        </div>
                    </div>
                    <div class="checkbox-field">
                        <input type="checkbox" id="redis-tls">
                        <label for="redis-tls">Enable TLS 1.3 Encryption</label>
                    </div>
                </section>

                <!-- File Storage -->
                <section class="form-section">
                    <h3><span class="material-icons-outlined">folder</span> Persistence</h3>
                    <div class="field">
                        <label>File Storage Path</label>
                        <input type="text" id="file-path" value="./files/">
                    </div>
                </section>

                <footer class="setup-footer">
                    <button type="submit" class="btn-primary">Apply Configurations</button>
                </footer>
            </form>
        </div>
    </div>
    <script>
        const { invoke } = window.__TAURI__.core;

        document.getElementById('setup-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const config = {
                server: {
                    host: document.getElementById('server-host').value,
                    port: parseInt(document.getElementById('server-port').value),
                    www: document.getElementById('server-www').value
                },
                redis: {
                    host: document.getElementById('redis-host').value,
                    port: parseInt(document.getElementById('redis-port').value),
                    username: document.getElementById('redis-user').value || null,
                    password: document.getElementById('redis-pass').value || null,
                    tls: document.getElementById('redis-tls').checked
                },
                file: {
                    storage_path: document.getElementById('file-path').value
                }
            };

            try {
                await invoke('save_configuration', { config });
                window.location.href = 'index.html';
            } catch (err) {
                alert('저장 실패: ' + err);
            }
        });
    </script>
</body>

</html>
