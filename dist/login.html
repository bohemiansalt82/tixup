<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tixup - Sign In</title>
    <link rel="stylesheet" href="assets/css/tokens.css">
    <link rel="stylesheet" href="assets/css/components.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <!-- Google Identity Services SDK -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #F8F9FA;
            /* light modern background */
        }

        .login-wrapper {
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .login-card {
            display: flex;
            flex-direction: row;
            width: 100%;
            max-width: 900px;
            height: 560px;
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 16px 48px rgba(0, 0, 0, 0.06);
            overflow: hidden;
            animation: cardEnter 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        @keyframes cardEnter {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Left Column */
        .login-left {
            width: 50%;
            padding: 48px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .login-logo-container {
            margin-bottom: 32px;
        }

        .login-logo {
            width: 100px;
            /* Filter darkens the default white logo text if it's an SVG without explicit fills */
            filter: invert(0.15) brightness(0.4);
        }

        .google-signin-container {
            width: 100%;
            margin-bottom: 24px;
        }

        .btn-google-outline {
            width: 100%;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: #ffffff;
            border: 1px solid #E2E8F0;
            border-radius: 8px;
            color: #1E293B;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-google-outline:hover {
            background-color: #F8FAFC;
            border-color: #CBD5E1;
        }

        .btn-google-outline img {
            width: 16px;
            height: 16px;
        }

        .divider-row {
            display: flex;
            align-items: center;
            text-align: center;
            margin-bottom: 24px;
        }

        .divider-row::before,
        .divider-row::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #F1F5F9;
        }

        .divider-row span {
            padding: 0 12px;
            color: #94A3B8;
            font-size: 11px;
            font-weight: 500;
            text-transform: uppercase;
        }

        /* Form */
        .login-form {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-group label {
            font-size: 12px;
            font-weight: 500;
            color: #334155;
        }

        .form-group label .required {
            color: #EF4444;
        }

        .form-group input {
            width: 100%;
            height: 42px;
            padding: 0 16px;
            background: #F8FAFC;
            border: 1px solid #E2E8F0;
            border-radius: 8px;
            color: #0F172A;
            font-size: 13px;
            outline: none;
            transition: all 0.2s;
        }

        .form-group input::placeholder {
            color: #94A3B8;
        }

        .form-group input:focus {
            border-color: #18675A;
            background: #ffffff;
            box-shadow: 0 0 0 3px rgba(24, 103, 90, 0.1);
        }

        /* Retain green border if pre-filled demo */
        .form-group input:not(:placeholder-shown) {
            border-color: #18675A;
        }

        .btn-primary {
            width: 100%;
            height: 42px;
            margin-top: 8px;
            background-color: #18675A;
            /* Deep teal/green to match design */
            border: none;
            border-radius: 8px;
            color: #ffffff;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-primary:hover {
            background-color: #135248;
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            background-color: #94A3B8;
        }

        .login-footer-text {
            margin-top: 8px;
            font-size: 12px;
            color: #64748B;
        }

        .login-footer-text a {
            color: #0F172A;
            font-weight: 600;
            text-decoration: none;
        }

        .login-footer-text a:hover {
            text-decoration: underline;
        }

        .login-error {
            color: #EF4444;
            font-size: 12px;
            margin-top: 8px;
            text-align: center;
            display: none;
        }

        /* Right Column */
        .login-right {
            width: 50%;
            padding: 12px;
            /* Small padding so the image has a white frame around it */
            display: flex;
            flex-direction: column;
        }

        .login-hero {
            flex: 1;
            /* Refined to use the exact background image user provided */
            background: url('assets/images/bg_account.png') center/cover no-repeat;
            background-color: #18675A;
            /* Fallback */
            border-radius: 12px;
            position: relative;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow: hidden;
            box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.05);
            /* subtle inner border */
        }

        .hero-content {
            color: #ffffff;
            position: relative;
            z-index: 2;
        }

        .hero-content h3 {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 12px;
            letter-spacing: -0.3px;
        }

        .hero-content p {
            font-size: 14px;
            line-height: 1.5;
            color: rgba(255, 255, 255, 0.9);
            max-width: 90%;
            font-weight: 400;
        }

        .hero-footer {
            position: relative;
            z-index: 2;
        }

        .hero-clients-title {
            font-size: 11px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 16px;
        }

        .hero-clients-wrapper {
            width: 100%;
            overflow: hidden;
            display: flex;
            align-items: center;
            /* Gradient mask to fade out edges (left/right) */
            -webkit-mask-image: linear-gradient(to right, transparent 0%, black 15%, black 85%, transparent 100%);
            mask-image: linear-gradient(to right, transparent 0%, black 15%, black 85%, transparent 100%);
            /* Force Safari to create a compositing layer for the mask */
            transform: translateZ(0);
        }

        .hero-clients-logos {
            display: flex;
            align-items: center;
            gap: 32px;
            padding-right: 32px;
            /* Needs to match gap for seamless loop */
            animation: marquee 12s linear infinite;
            width: max-content;
            /* Hardware acceleration fix for Safari rendering artifacts */
            transform: translateZ(0);
            will-change: transform;
        }

        @keyframes marquee {
            0% {
                transform: translateX(0);
            }

            100% {
                transform: translateX(-50%);
            }
        }

        .client-logo {
            height: 22px;
            width: auto;
            object-fit: contain;
            opacity: 0.9;
            flex-shrink: 0;
            /* Make white */
            filter: brightness(0) invert(1);
            /* Prevent Safari's filter glitch on nested transformed layers */
            transform: translateZ(0);
            -webkit-transform: translateZ(0);
            backface-visibility: hidden;
        }

        @media (max-width: 768px) {
            .login-card {
                flex-direction: column;
                height: auto;
                max-width: 440px;
            }

            .login-left,
            .login-right {
                width: 100%;
            }

            .login-right {
                height: 300px;
                padding-top: 0;
            }

            .login-left {
                padding: 40px 32px;
            }

            .login-hero {
                padding: 32px;
            }
        }
    </style>
</head>

<body>
    <div class="login-wrapper">
        <div class="login-card">

            <!-- Left half: Auth Form -->
            <div class="login-left">
                <div class="login-logo-container">
                    <!-- Replace with brand logo -->
                    <img src="assets/images/icons/tixup_logo.svg" alt="TIXUP" class="login-logo">
                </div>

                <div class="google-signin-container">
                    <button class="btn-google-outline" id="google-login-btn">
                        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
                        Sign in with Google
                    </button>
                    <div class="login-error" id="login-error"></div>
                </div>

                <div class="divider-row">
                    <span>Or</span>
                </div>

                <div class="login-form">
                    <div class="form-group">
                        <label>Name <span class="required">*</span></label>
                        <input type="text" id="login-name" placeholder="jy.choi" autocomplete="name">
                    </div>
                    <div class="form-group">
                        <label>Email <span class="required">*</span></label>
                        <input type="email" id="login-email" placeholder="Enter your email" autocomplete="email">
                    </div>
                    <div class="form-group">
                        <label>Password <span class="required">*</span></label>
                        <input type="password" id="login-password" placeholder="Enter your password">
                    </div>

                    <button class="btn-primary" id="demo-login-btn" disabled>
                        Create Account
                    </button>

                    <div class="login-footer-text">
                        Already have an account? <a href="#">Sign in</a>
                    </div>
                </div>
            </div>

            <!-- Right half: Hero Information -->
            <div class="login-right">
                <div class="login-hero">
                    <div class="hero-content">
                        <h3>Secured Task Management</h3>
                        <p>"Tix" means "Ticket" and refers to a single unit of task</p>
                    </div>

                    <div class="hero-footer">
                        <div class="hero-clients-title">Our Clients</div>
                        <div class="hero-clients-wrapper">
                            <div class="hero-clients-logos">
                                <!-- Set 1 -->
                                <img src="assets/images/samsung.svg" alt="Samsung" class="client-logo">
                                <img src="assets/images/kakaopay.svg" alt="KakaoPay" class="client-logo">
                                <img src="assets/images/cgv.svg" alt="CGV" class="client-logo">
                                <img src="assets/images/hanabank.svg" alt="Hana Bank" class="client-logo">
                                <img src="assets/images/doosan.svg" alt="Doosan" class="client-logo">
                                <!-- Set 2 (Duplicated for seamless infinite loop) -->
                                <img src="assets/images/samsung.svg" alt="Samsung" class="client-logo">
                                <img src="assets/images/kakaopay.svg" alt="KakaoPay" class="client-logo">
                                <img src="assets/images/cgv.svg" alt="CGV" class="client-logo">
                                <img src="assets/images/hanabank.svg" alt="Hana Bank" class="client-logo">
                                <img src="assets/images/doosan.svg" alt="Doosan" class="client-logo">
                            </div>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="assets/js/tixup-auth.js"></script>
    <script>
        // ══════════════════════════════════════════
        // Google OAuth Client ID Configuration
        // Get yours at: https://console.cloud.google.com/apis/credentials
        // ══════════════════════════════════════════
        const GOOGLE_CLIENT_ID = '467199830071-2b2hvheuuju9vnpqmds727vahefjucvf.apps.googleusercontent.com';

        // If already logged in, redirect
        if (TixupAuth.getUser()) {
            window.location.href = 'test_drive.html';
        }

        const nameInput = document.getElementById('login-name');
        const emailInput = document.getElementById('login-email');
        const demoBtn = document.getElementById('demo-login-btn');
        const googleBtn = document.getElementById('google-login-btn');
        const errorEl = document.getElementById('login-error');

        // ─── Google Identity Services ───
        function handleGoogleCredential(response) {
            try {
                // Decode JWT token safely (handling Base64URL and UTF-8)
                const base64Url = response.credential.split('.')[1];
                const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                const jsonPayload = decodeURIComponent(atob(base64).split('').map(c => {
                    return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                }).join(''));
                const payload = JSON.parse(jsonPayload);

                const user = {
                    id: 'google-' + payload.sub,
                    name: payload.name || payload.email.split('@')[0],
                    email: payload.email,
                    picture: payload.picture || `https://ui-avatars.com/api/?name=${encodeURIComponent(payload.name || 'U')}&background=6C5CE7&color=fff&size=128`
                };

                TixupAuth.setUser(user);
                TixupAuth.migrateOldData();

                // Create default space if none exist
                if (TixupAuth.getSpaces().length === 0) {
                    const space = TixupAuth.createSpace('My Project');
                    TixupAuth.setActiveSpaceId(space.id);
                }

                window.location.href = 'test_drive.html';
            } catch (err) {
                console.error('Google login error:', err);
                showError('Login failed. Please try again.');
            }
        }

        function initGoogleSignIn() {
            if (!GOOGLE_CLIENT_ID) {
                // No Client ID configured - show prompt to set it up
                googleBtn.addEventListener('click', () => {
                    const clientId = prompt(
                        'Google OAuth Client ID를 입력하세요.\n\n' +
                        '발급 방법:\n' +
                        '1. https://console.cloud.google.com/apis/credentials 접속\n' +
                        '2. "Create Credentials" → "OAuth client ID" 선택\n' +
                        '3. Application type: "Web application"\n' +
                        '4. Authorized JavaScript origins에 "http://localhost:3000" 추가\n' +
                        '5. 생성된 Client ID를 여기에 붙여넣기'
                    );
                    if (clientId && clientId.trim()) {
                        localStorage.setItem('tixup-google-client-id', clientId.trim());
                        window.location.reload(); // Reload to initialize with the new ID
                    }
                });
                return;
            }

            // Wait for GIS library to load
            const waitForGIS = setInterval(() => {
                if (typeof google !== 'undefined' && google.accounts) {
                    clearInterval(waitForGIS);

                    google.accounts.id.initialize({
                        client_id: GOOGLE_CLIENT_ID,
                        callback: handleGoogleCredential,
                        auto_select: false,
                        ux_mode: 'popup'
                    });

                    // Override our custom button to trigger Google popup
                    googleBtn.addEventListener('click', () => {
                        google.accounts.id.prompt((notification) => {
                            if (notification.isNotDisplayed() || notification.isSkippedMoment()) {
                                // FedCM / One Tap blocked → use popup flow
                                google.accounts.oauth2.initTokenClient({
                                    client_id: GOOGLE_CLIENT_ID,
                                    scope: 'openid email profile',
                                    callback: async (tokenResponse) => {
                                        try {
                                            const res = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
                                                headers: { Authorization: `Bearer ${tokenResponse.access_token}` }
                                            });
                                            const payload = await res.json();

                                            const user = {
                                                id: 'google-' + payload.sub,
                                                name: payload.name || payload.email.split('@')[0],
                                                email: payload.email,
                                                picture: payload.picture || `https://ui-avatars.com/api/?name=${encodeURIComponent(payload.name || 'U')}&background=6C5CE7&color=fff&size=128`
                                            };

                                            TixupAuth.setUser(user);
                                            TixupAuth.migrateOldData();

                                            if (TixupAuth.getSpaces().length === 0) {
                                                const space = TixupAuth.createSpace('My Project');
                                                TixupAuth.setActiveSpaceId(space.id);
                                            }

                                            window.location.href = 'test_drive.html';
                                        } catch (err) {
                                            console.error('Google userinfo error:', err);
                                            showError('Failed to get user info. Please try again.');
                                        }
                                    }
                                }).requestAccessToken();
                            }
                        });
                    });
                }
            }, 100);

            // Timeout after 5 seconds
            setTimeout(() => {
                if (typeof google === 'undefined') {
                    console.warn('Google Identity Services failed to load');
                }
            }, 5000);
        }

        function showError(msg) {
            errorEl.textContent = msg;
            errorEl.style.display = 'block';
            setTimeout(() => { errorEl.style.display = 'none'; }, 5000);
        }

        // Initialize Google Sign-In
        initGoogleSignIn();

        // ─── Demo Login ───
        function validateForm() {
            const name = nameInput.value.trim();
            const email = emailInput.value.trim();
            demoBtn.disabled = !(name && email && email.includes('@'));
        }

        nameInput.addEventListener('input', validateForm);
        emailInput.addEventListener('input', validateForm);

        demoBtn.addEventListener('click', () => {
            const name = nameInput.value.trim();
            const email = emailInput.value.trim();
            if (!name || !email) return;

            TixupAuth.demoLogin(name, email);
            window.location.href = 'test_drive.html';
        });

        // Enter key submits
        [nameInput, emailInput].forEach(inp => {
            inp.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !demoBtn.disabled) {
                    demoBtn.click();
                }
            });
        });
    </script>
</body>

</html>
